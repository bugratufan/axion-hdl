<svg xmlns="http://www.w3.org/2000/svg" viewBox="5 -175 850 850" width="850" height="850">
  <defs>
    <mask id="dot-mask">
      <rect x="-500" y="-500" width="1500" height="1500" fill="white"/>
      <circle cx="24" cy="-1" r="22" fill="black"/>
    </mask>
  </defs>
  
  <g transform="translate(250, 250)">
    <!-- Text with hole cut out where circle goes -->
    <g mask="url(#dot-mask)">
      <text x="0" y="46" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" font-size="130" fill="#ffffff">
        AXI<tspan fill="#2f81f7">ON</tspan>
      </text>
      <text x="250" y="46" text-anchor="start" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" font-size="130" fill="#ffffff">
        -HDL
      </text>
    </g>
    
    <!-- Blue dot on top -->
    <circle cx="24" cy="-1" r="16" fill="#2f81f7"/>
  </g>
</svg>
