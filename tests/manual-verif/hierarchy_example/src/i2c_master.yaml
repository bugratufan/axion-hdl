module: i2c_master
description: I2C Master Controller Register Map
base_addr: 0x0000

registers:
  - name: CTRL
    address: 0x00
    description: Control register
    fields:
      - name: ENABLE
        bits: "0"
        access: RW
        description: Enable the I2C master
        reset_value: 0
      - name: START
        bits: "1"
        access: RW
        description: Generate START condition
        reset_value: 0
      - name: STOP
        bits: "2"
        access: RW
        description: Generate STOP condition
        reset_value: 0

  - name: STATUS
    address: 0x04
    description: Status register
    fields:
      - name: BUSY
        bits: "0"
        access: RO
        description: Bus busy
        reset_value: 0
      - name: ACK
        bits: "1"
        access: RO
        description: ACK received from slave
        reset_value: 0
      - name: ARBLOST
        bits: "2"
        access: RO
        description: Arbitration lost
        reset_value: 0

  - name: PRESCALE
    address: 0x08
    description: Clock prescaler
    fields:
      - name: VALUE
        bits: "15:0"
        access: RW
        description: Prescaler value for SCL frequency
        reset_value: 99

  - name: DATA
    address: 0x0C
    description: Data register
    fields:
      - name: BYTE
        bits: "7:0"
        access: RW
        description: Data byte (write to TX, read from RX)
        reset_value: 0
