<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Map</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            background-color: var(--bg-color);
        }
        .hero {
            text-align: center;
            padding: 2rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            border-radius: 16px;
            color: white;
        }
        .hero h1 { color: white; border: none; margin: 0; font-size: 2rem; }
        .hero p { margin: 0.5rem 0 0; opacity: 0.9; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        th {
            background: var(--primary-color);
            color: white;
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
        }
        td {
            padding: 0.65rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #eff6ff; }
        code {
            background: #f1f5f9;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9em;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #64748b;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Address Map</h1>
        <p>Full module instance address space overview</p>
    </div>
    <table>
        <thead>
            <tr>
                <th>Instance Name</th>
                <th>Module</th>
                <th>Base Address</th>
                <th>End Address</th>
                <th>Size</th>
            </tr>
        </thead>
        <tbody>
<tr><td><code>spi_master_0</code></td><td>spi_master</td><td><code>0x40000000</code></td><td><code>0x40000013</code></td><td>20 B</td></tr>
<tr><td><code>spi_master_1</code></td><td>spi_master</td><td><code>0x40001000</code></td><td><code>0x40001013</code></td><td>20 B</td></tr>
<tr><td><code>i2c_master</code></td><td>i2c_master</td><td><code>0x40002000</code></td><td><code>0x4000200F</code></td><td>16 B</td></tr>
        </tbody>
    </table>
    <footer>Generated by Axion HDL</footer>
</body>
</html>
