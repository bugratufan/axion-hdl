module: subregister_test_yaml
base_addr: "0x4000"

config:
  cdc_en: false

registers:
  # Standard Register: config_reg
  # Address: 0x00
  # Default: 0xCAFEBABE
  - name: config_reg
    addr: "0x00"
    access: RW
    width: 32
    default: "0xCAFEBABE"
    description: "Configuration Register"

  # Packed Register: status_reg (RO)
  # Address: 0x04
  # Contains 5 packed fields
  - name: status_reg
    addr: "0x04"
    access: RO
    fields:
      - name: ready
        bit_offset: 0
        width: 1
        access: RO
        description: "Ready Status"
      - name: err_flag
        bit_offset: 1
        width: 1
        access: RO
        description: "Error Flag"
      - name: busy
        bit_offset: 2
        width: 1
        access: RO
        description: "Busy Flag"
      - name: state
        bit_offset: 4
        width: 4
        access: RO
        description: "State Machine State"
      - name: count
        bit_offset: 8
        width: 8
        access: RO
        description: "Event Counter"

  # Packed Register: control_reg (RW)
  # Address: 0x10
  # Contains 4 packed fields with defaults
  - name: control_reg
    addr: "0x10"
    access: RW
    fields:
      - name: enable
        bit_offset: 0
        width: 1
        access: RW
        default: "1"
        description: "Enable Module"
      - name: mode
        bit_offset: 1
        width: 1
        access: RW
        default: "0"
        description: "Mode Select"
      - name: irq_mask
        bit_offset: 4
        width: 4
        access: RW
        default: "0xF"
        description: "Interrupt Mask"
      - name: timeout
        bit_offset: 8
        width: 8
        access: RW
        default: "100"
        description: "Timeout Value"
